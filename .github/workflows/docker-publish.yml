# Build and push IdP Platform images to Docker Hub on version tags (v*).
# Repository secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#
# Optional repository variables for the frontend image:
#   VITE_API_BASE_URL, VITE_OAUTH_REDIRECT_URI, VITE_OAUTH_CLIENT_ID,
#   VITE_API_VERSION, VITE_API_TIMEOUT_MS

name: Docker publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/idpplatform-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/idpplatform-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:5000' }}
            VITE_OAUTH_REDIRECT_URI=${{ vars.VITE_OAUTH_REDIRECT_URI || 'http://localhost:3000/auth/callback' }}
            VITE_OAUTH_CLIENT_ID=${{ vars.VITE_OAUTH_CLIENT_ID || 'platform-admin-web' }}
            VITE_API_VERSION=${{ vars.VITE_API_VERSION || '1.0' }}
            VITE_API_TIMEOUT_MS=${{ vars.VITE_API_TIMEOUT_MS || '30000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
