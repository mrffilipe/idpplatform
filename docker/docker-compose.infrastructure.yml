# PostgreSQL and Redis only — run separately from the application stack.
# Usage: docker compose -f docker/docker-compose.infrastructure.yml --env-file docker/.env.infrastructure up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: idpplatform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-idpplatform_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-idpplatform_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - idpplatform-infra

  redis:
    image: redis:7-alpine
    container_name: idpplatform-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-default_password}
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-default_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - idpplatform-infra

volumes:
  pgdata:
  redisdata:

networks:
  idpplatform-infra:
    name: idpplatform-infra
