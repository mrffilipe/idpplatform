# IdP Platform application (API + admin frontend) — uses published images only.
# PostgreSQL and Redis are NOT included; use docker-compose.infrastructure.yml or managed services.
#
# Usage:
#   cp docker/.env.app.example docker/.env
#   docker compose -f docker/docker-compose.yml --env-file docker/.env up -d
#
# Optional: attach API to the infrastructure network (postgres/redis hostnames) by also running:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.infra-network.yml --env-file docker/.env up -d

services:
  api:
    image: ${DOCKERHUB_USERNAME}/idpplatform-api:${IMAGE_TAG:-latest}
    container_name: idpplatform-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_HOST_PORT:-5000}:8080"
    volumes:
      - api-dataprotection:/app/keys/data-protection
      # Uncomment to mount a JWT signing key file (set Jwt__SigningKeyPath=keys/oidc-signing.pem):
      # - ./keys/oidc-signing.pem:/app/keys/oidc-signing.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1.0/platform/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - idpplatform-app

  frontend:
    image: ${DOCKERHUB_USERNAME}/idpplatform-frontend:${IMAGE_TAG:-latest}
    container_name: idpplatform-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - idpplatform-app

volumes:
  api-dataprotection:

networks:
  idpplatform-app:
    name: idpplatform-app
